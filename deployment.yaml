apiVersion: v1
kind: Namespace
metadata:
  name: logsense
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logsense-config
  namespace: logsense
data:
  ANOMALY_THRESHOLD: "0.5"
  LLM_TIMEOUT_SECONDS: "12"
  BUFFER_SIZE: "100"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: logsense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/fatihburakk/logsense-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        envFrom:
        - configMapRef:
            name: logsense-config
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: logsense-secrets
              key: OPENAI_API_KEY
        - name: LOGSENSE_API_KEY
          valueFrom:
            secretKeyRef:
              name: logsense-secrets
              key: LOGSENSE_API_KEY
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: logsense
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    nodePort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: logsense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/fatihburakk/logsense-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "256Mi"
            cpu: "300m"
          requests:
            memory: "128Mi"
            cpu: "50m"
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://<SUNUCU_IP>:30000"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: logsense
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
