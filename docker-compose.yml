# ───────────────
# LogSense AI — Docker Compose (Mini Production)
# ───────────────
services:
  db:
    image: postgres:16
    container_name: logsense-db
    restart: always
    environment:
      POSTGRES_USER: logsense
      POSTGRES_PASSWORD: logsense_pass_2024
      POSTGRES_DB: logsense_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: logsense-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
    container_name: logsense-backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://logsense:logsense_pass_2024@db:5432/logsense_ai
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LOGSENSE_API_KEY: ${LOGSENSE_API_KEY:-logsense_secure_key_2024}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-0.5}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-12}
      BUFFER_SIZE: ${BUFFER_SIZE:-100}
    ports:
      - "8000:8000"
    volumes:
      - backups_data:/app/backups

  celery_worker:
    build: 
      context: ./backend
    container_name: logsense-worker
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://logsense:logsense_pass_2024@db:5432/logsense_ai
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANOMALY_THRESHOLD: ${ANOMALY_THRESHOLD:-0.5}
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - backups_data:/app/backups

  celery_beat:
    build: 
      context: ./backend
    container_name: logsense-beat
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://logsense:logsense_pass_2024@db:5432/logsense_ai
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: celery -A worker.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: logsense-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backups_data:
